<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahupuaa v2 - Phaser 4</title>
    <style>
      html, body { margin: 0; padding: 0; background: #1a1a2e; }
      body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      #game { display: block; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud" style="position:fixed;top:16px;left:16px;background:rgba(0,0,0,0.7);color:#e8d5a3;font-family:Georgia,serif;font-size:14px;padding:12px 16px;border-radius:6px;pointer-events:none;line-height:1.8;">
      Turn <span id="hud-turn">0</span><br>
      Pop <span id="hud-pop">0</span> / <span id="hud-popcap">0</span><br>
      Taro <span id="hud-taro">0</span> &nbsp;
      Fish <span id="hud-fish">0</span><br>
      Wood <span id="hud-wood">0</span> &nbsp;
      Stone <span id="hud-stone">0</span>
    </div>
    <button id="end-turn" style="position:fixed;bottom:24px;right:24px;background:#3a2a10;color:#e8d5a3;font-family:Georgia,serif;font-size:16px;padding:10px 24px;border:1px solid #a07840;border-radius:4px;cursor:pointer;">End Turn</button>
    <div id="selector-panel" style="position:fixed;top:50%;right:16px;transform:translateY(-50%);background:rgba(0,0,0,0.7);color:#e8d5a3;font-family:Georgia,serif;font-size:14px;padding:12px 16px;border-radius:6px;min-width:140px;">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;opacity:0.7;">Build</div>
      <button id="btn-type-hale" style="display:block;width:100%;margin-bottom:6px;padding:6px 8px;background:#3a2a10;color:#e8d5a3;font-family:Georgia,serif;font-size:13px;border:1px solid #5a4a30;border-radius:3px;cursor:pointer;text-align:left;">Hale</button>
      <button id="btn-type-loi" style="display:block;width:100%;margin-bottom:6px;padding:6px 8px;background:#3a2a10;color:#e8d5a3;font-family:Georgia,serif;font-size:13px;border:1px solid #5a4a30;border-radius:3px;cursor:pointer;text-align:left;">Loi (2 wood)</button>
      <button id="btn-type-loko-ia" style="display:block;width:100%;margin-bottom:6px;padding:6px 8px;background:#3a2a10;color:#e8d5a3;font-family:Georgia,serif;font-size:13px;border:1px solid #5a4a30;border-radius:3px;cursor:pointer;text-align:left;">Loko-ia (3 stone)</button>
      <div style="border-top:1px solid #5a4a30;margin:10px 0;"></div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;opacity:0.7;">Tier</div>
      <div style="display:flex;gap:6px;">
        <button id="btn-tier-0" style="flex:1;padding:5px 4px;background:#3a2a10;color:#e8d5a3;font-family:Georgia,serif;font-size:11px;border:1px solid #5a4a30;border-radius:3px;cursor:pointer;text-align:center;">T1 (3w)</button>
        <button id="btn-tier-1" style="flex:1;padding:5px 4px;background:#3a2a10;color:#e8d5a3;font-family:Georgia,serif;font-size:11px;border:1px solid #5a4a30;border-radius:3px;cursor:pointer;text-align:center;">T2 (5w 2s)</button>
        <button id="btn-tier-2" style="flex:1;padding:5px 4px;background:#3a2a10;color:#e8d5a3;font-family:Georgia,serif;font-size:11px;border:1px solid #5a4a30;border-radius:3px;cursor:pointer;text-align:center;">T3 (5w 5s)</button>
      </div>
      <div id="rejection-reason" style="margin-top:10px;font-size:12px;color:#ff6b6b;min-height:16px;opacity:0;transition:opacity 3s;"></div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
